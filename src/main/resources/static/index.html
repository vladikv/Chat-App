<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div id="app">

    <!-- Left Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header">
            <span>💬 Chat App</span>
        </div>
        <!-- Tabs -->
        <div id="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')"># Rooms</button>
            <button class="tab-btn" onclick="switchTab('dms')">✉️ DMs</button>
        </div>

        <!-- Rooms Tab -->
        <div id="tab-rooms">
            <div id="rooms-header">
                <span>Rooms</span>
                <button id="add-room-btn" onclick="toggleNewRoom()">+</button>
            </div>
            <div id="new-room" style="display:none">
                <input id="room-input" type="text" placeholder="New room name..." onkeydown="if(event.key==='Enter') createRoom()"/>
            </div>
            <div id="rooms-list"></div>
        </div>

        <!-- DMs Tab -->
        <div id="tab-dms" style="display:none">
            <div id="dm-list"></div>
        </div>

        <!-- Bottom user panel -->
        <div id="user-panel">
            <div id="profile-btn" onclick="window.location.href='/profile/profile.html'"></div>
            <span id="username-label"></span>
            <button id="theme-btn" onclick="toggleTheme()">🌙</button>
            <button id="logout-btn" onclick="logout()">Log out</button>
        </div>
    </div>

    <!-- Main Chat -->
    <div id="main">
        <div id="header">
            <button id="toggle-sidebar-btn" onclick="toggleLeftSidebar()">☰</button>
            <button id="back-btn" style="display:none" onclick="showSidebar()">‹</button>
            <span id="room-title">Select a room</span>
            <div id="search-bar" style="display:none">
                <input id="search-input" type="text" placeholder="Search messages..."
                       oninput="searchMessages()"
                       onkeydown="if(event.key==='Escape') closeSearch()"/>
                <button onclick="closeSearch()">✕</button>
            </div>
            <button id="search-btn" onclick="toggleSearch()">🔍</button>
            <button id="members-btn" onclick="toggleRightSidebar()">👥</button>
        </div>

        <div id="pin-banner" style="display:none">
            <span>📌</span>
            <div id="pin-banner-text"></div>
            <button onclick="unpinMessage()">✕</button>
        </div>

        <div id="chat"></div>

        <div id="typing-indicator"></div>

        <div id="reply-preview" style="display:none">
            <div id="reply-preview-content">
                <span id="reply-preview-sender"></span>
                <span id="reply-preview-text"></span>
            </div>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div id="bottom" style="display:none">
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)" accept="image/*,.pdf,.doc,.docx,.zip,.txt"/>
            <button id="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <input id="input" type="text" placeholder="Message..."
                   onkeydown="if(event.key==='Enter') send()"
                   oninput="notifyTyping()"/>
            <button id="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <!-- Right Sidebar -->
    <div id="right-sidebar" class="hidden">
        <div id="right-sidebar-header">
            <span>Members</span>
            <button onclick="toggleRightSidebar()">✕</button>
        </div>
        <div id="online-section">
            <div class="members-label">ONLINE</div>
            <div id="online-list"></div>
        </div>
        <div id="offline-section">
            <div class="members-label">OFFLINE</div>
            <div id="offline-list"></div>
            <div id="offline-more"></div>
        </div>
    </div>

</div>
<script src="/app.js"></script>
<div id="context-menu">
    <div class="context-item" id="ctx-edit" onclick="contextEdit()">✏️ Edit</div>
    <div class="context-item" id="ctx-reply" onclick="contextReply()">↩️ Reply</div>
    <div class="context-item" id="ctx-pin" onclick="contextPin()">📌 Pin</div>
    <div class="context-item danger" id="ctx-delete" onclick="contextDelete()">🗑 Delete</div>
</div>

<div id="emoji-picker">
    <span onclick="addReaction('😮')">😮</span>
    <span onclick="addReaction('😢')">😢</span>
    <span onclick="addReaction('🔥')">🔥</span>
    <span onclick="addReaction('😂')">😂</span>
    <span onclick="addReaction('😎')">😎</span>
    <span onclick="addReaction('💀')">💀</span>
    <span onclick="addReaction('🤝')">🤝</span>
    <span onclick="addReaction('👀')">👀</span>
</div>

<div id="file-preview-modal" style="display:none">
    <div id="file-preview-backdrop" onclick="cancelFileUpload()"></div>
    <div id="file-preview-card">
        <div id="file-preview-header">
            <span>Send file</span>
            <button onclick="cancelFileUpload()">✕</button>
        </div>
        <div id="file-preview-content"></div>
        <input id="file-caption" type="text" placeholder="Add a caption..."
               onkeydown="if(event.key==='Enter') confirmFileUpload()"/>
        <div id="file-preview-actions">
            <button id="file-cancel-btn" onclick="cancelFileUpload()">Cancel</button>
            <button id="file-send-btn" onclick="confirmFileUpload()">Send ↑</button>
        </div>
    </div>
</div>

<div id="room-action-sheet" style="display:none">
    <div id="room-action-backdrop" onclick="closeRoomActionSheet()"></div>
    <div id="room-action-card">
        <div id="room-action-title"></div>
        <button onclick="roomActionRename()">✏️ Rename</button>
        <button onclick="roomActionDelete()" class="danger">🗑 Delete</button>
        <button onclick="closeRoomActionSheet()">Cancel</button>
    </div>
</div>
</body>
</html>
