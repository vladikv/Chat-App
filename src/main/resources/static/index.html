<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #16213e; padding: 16px 24px; font-size: 20px; font-weight: bold; color: #e94560; }
        #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #16213e; padding: 10px 14px; border-radius: 10px; max-width: 60%; }
        .message .sender { font-size: 12px; color: #e94560; margin-bottom: 4px; }
        .message .text { font-size: 15px; }
        .message .time { font-size: 11px; color: #888; margin-top-4px; text-align: right; }
        #bottom { background: #16213e; padding: 12px 16px; display: flex; gap: 8px; }
        #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: none; background: #0f3460; color: #eee; font-size: 15px; }
        #input:focus { outline: 2px solid #e94560; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: #e94560; color: white; font-size: 15px; cursor: pointer; }
        button:hover { background: #c73652; }
        #status { padding: 6px 24px; font-size: 12px; color: #888; background: #16213e; }
    </style>
</head>
<body>

<div id="header">💬 Chat App — #general</div>
<div id="status">Connecting...</div>
<div id="chat"></div>
<div id="bottom">
    <input id="input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') send()"/>
    <button onclick="send()">Send</button>
</div>

<script>
    const ROOM_ID = 1;
    const TOKEN = prompt("Paste your JWT token:");

    const socket = new SockJS('http://localhost:8081/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({ Authorization: 'Bearer ' + TOKEN }, function () {
        document.getElementById('status').textContent = '🟢 Connected';

        // Завантажуємо історію
        fetch(`http://localhost:8081/api/rooms/${ROOM_ID}/messages`, {
            headers: { Authorization: 'Bearer ' + TOKEN }
        })
            .then(r => r.json())
            .then(messages => messages.forEach(addMessage));

        // Підписуємось на нові повідомлення
        stompClient.subscribe(`/topic/room.${ROOM_ID}`, function (msg) {
            addMessage(JSON.parse(msg.body));
        });
    });

    function send() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text) return;

        stompClient.send(`/app/chat.send/${ROOM_ID}`, {},
            JSON.stringify({ content: text })
        );
        input.value = '';
    }

    function addMessage(msg) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
            <div class="sender">${msg.senderUsername}</div>
            <div class="text">${msg.content}</div>
            <div class="time">${new Date(msg.sentAt).toLocaleTimeString()}</div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
