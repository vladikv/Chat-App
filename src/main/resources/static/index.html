<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
<div id="app">

    <!-- Сайдбар -->
    <div id="sidebar">
        <div id="sidebar-header">
            <span>💬 Chat App</span>
            <button id="logout-btn" onclick="logout()">↩</button>
        </div>
        <div id="user-info"></div>
        <div id="rooms-header">
            <span>Rooms</span>
            <button id="add-room-btn" onclick="toggleNewRoom()">+</button>
        </div>
        <div id="new-room" style="display:none">
            <input id="room-input" type="text" placeholder="Room name..."/>
            <button onclick="createRoom()">Create</button>
        </div>
        <div id="rooms-list"></div>
    </div>

    <!-- Чат -->
    <div id="main">
        <div id="header">
            <button id="back-btn" onclick="showSidebar()">‹</button>
            <span id="room-title">Select a room</span>
        </div>
        <div id="status">Connecting...</div>
        <div id="chat"></div>
        <div id="typing-indicator"></div>
        <div id="bottom" style="display:none">
            <input id="input" type="text" placeholder="Message..."
                   onkeydown="if(event.key==='Enter') send()"
                   oninput="notifyTyping()"/>
            <button id="send-btn" onclick="send()">↑</button>
        </div>
    </div>

</div>
<script src="/app.js"></script>
</body>
</html>
