<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App — Login</title>
    <link rel="stylesheet" href="/login/login.css">
</head>
<body>
<div id="container">
    <div id="card">
        <div style="display:flex;align-items:center;justify-content:center;position:relative;">
            <h1>💬 Chat App</h1>
            <button id="theme-btn" onclick="toggleTheme()"
                    style="position:absolute;right:0;background:transparent;border:none;font-size:20px;cursor:pointer;line-height:1;">
                🌙
            </button>
        </div>

        <div id="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <div id="error"></div>

        <div id="login-form">
            <input id="login-username" type="text" placeholder="Username"/>
            <input id="login-password" type="password" placeholder="Password"/>
            <button onclick="login()">Login</button>
        </div>

        <div id="register-form" style="display:none">
            <input id="reg-username" type="text" placeholder="Username"/>
            <input id="reg-email" type="email" placeholder="Email"/>
            <input id="reg-password" type="password" placeholder="Password"/>
            <button onclick="register()">Register</button>
        </div>
    </div>

</div>
<script src="/login/login.js"></script>
</body>
</html>
